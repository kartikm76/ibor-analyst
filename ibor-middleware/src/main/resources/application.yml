# Base configuration — always loaded. No profile overlays exist for Docker or local dev.
# application-test.yml is the only overlay; it activates automatically during test runs.

server:
  port: 8080
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ibor}
    username: ${DB_USER:ibor}
    password: ${DB_PASSWORD:ibor}
    hikari:
      maximum-pool-size: 25
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
  jooq:
    sql-dialect: POSTGRES

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
logging:
  level:
    com.kmakker.ibor: INFO
    com.kmakker.ibor.jodi: DEBUG
